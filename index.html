<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Клинические замеры</title>
    
    <!-- Подключаем Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Подключаем React и ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- Подключаем Babel для преобразования JSX в браузере -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Стили для печати (скрываем интерфейс) */
        @media print {
            body { background: white; }
            .print-hidden, header, .flex.overflow-x-auto, button { display: none !important; }
            .max-w-5xl { max-width: 100%; margin: 0; padding: 0; }
            .shadow-sm, .shadow-lg { box-shadow: none !important; }
            .border { border-color: #ddd !important; }
        }
        
        /* Простая анимация появления */
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">

    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Встроенные иконки (SVG), чтобы не зависеть от внешних библиотек
        const Icons = {
            Ruler: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21.3 15.3l-2.6 2.6a1 1 0 01-1.4 0l-12-12a1 1 0 010-1.4l2.6-2.6a1 1 0 011.4 0l12 12a1 1 0 010 1.4z"/><path d="M14.5 4.5l5 5"/><path d="M12 7l1 1"/><path d="M9 10l1 1"/><path d="M6 13l1 1"/></svg>
            ),
            Activity: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
            ),
            FileText: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
            ),
            Info: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
            ),
            AlertTriangle: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            ),
            ChevronRight: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            ),
            CheckCircle2: ({ size = 24, className = "" }) => (
                <svg width={size} height={size} className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/></svg>
            )
        };

        const App = () => {
            const [activeTab, setActiveTab] = useState('somatometry');
            const [injuredSide, setInjuredSide] = useState('left');

            const [somaData, setSomaData] = useState({
                kneeMidL: '', kneeMidR: '',
                knee5L: '', knee5R: '',
                knee10L: '', knee10R: '',
                calfL: '', calfR: '',
                ankleL: '', ankleR: '',
                ankle8L: '', ankle8R: '',
                shoulderL: '', shoulderR: '',
            });

            const [gonioData, setGonioData] = useState({
                kneeAromFlexL: '', kneeAromFlexR: '',
                kneePromFlexL: '', kneePromFlexR: '',
                kneeAromExtL: '', kneeAromExtR: '',
                kneePromExtL: '', kneePromExtR: '',
                shoulderAromAbdL: '', shoulderAromAbdR: '',
                shoulderPromAbdL: '', shoulderPromAbdR: '',
            });

            const handleSomaChange = (field, value) => {
                setSomaData(prev => ({ ...prev, [field]: value }));
            };

            const handleGonioChange = (field, value) => {
                setGonioData(prev => ({ ...prev, [field]: value }));
            };

            const renderTabButton = (id, IconComponent, label) => (
                <button
                    key={id}
                    onClick={() => setActiveTab(id)}
                    className={`flex items-center gap-2 px-6 py-3 font-medium text-sm transition-all duration-200 border-b-2 ${
                        activeTab === id 
                        ? 'border-teal-600 text-teal-700 bg-teal-50' 
                        : 'border-transparent text-gray-500 hover:text-gray-700 hover:bg-gray-50'
                    }`}
                >
                    <IconComponent size={18} />
                    {label}
                </button>
            );

            const SideSelector = () => (
                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-6 flex flex-col sm:flex-row items-center justify-between gap-4">
                    <div className="flex items-center gap-2 text-gray-700 font-medium">
                        <Icons.AlertTriangle size={20} className="text-amber-500" />
                        Травмированная сторона:
                    </div>
                    <div className="flex bg-gray-100 p-1 rounded-lg">
                        <button
                            onClick={() => setInjuredSide('left')}
                            className={`px-6 py-2 rounded-md font-medium text-sm transition-all ${
                                injuredSide === 'left' ? 'bg-white shadow text-teal-700' : 'text-gray-500 hover:text-gray-700'
                            }`}
                        >
                            Левая (L)
                        </button>
                        <button
                            onClick={() => setInjuredSide('right')}
                            className={`px-6 py-2 rounded-md font-medium text-sm transition-all ${
                                injuredSide === 'right' ? 'bg-white shadow text-teal-700' : 'text-gray-500 hover:text-gray-700'
                            }`}
                        >
                            Правая (R)
                        </button>
                    </div>
                </div>
            );

            const calculateDiff = (left, right) => {
                if (!left || !right) return null;
                const lVal = parseFloat(left);
                const rVal = parseFloat(right);
                const diff = injuredSide === 'left' ? lVal - rVal : rVal - lVal;
                return isNaN(diff) ? null : diff;
            };

            const calculateReserve = (arom, prom) => {
                if (!arom || !prom) return null;
                const reserve = parseFloat(prom) - parseFloat(arom);
                return isNaN(reserve) ? null : reserve.toFixed(0);
            };

            const renderSomatometryTab = () => {
                const renderRow = (label, fieldL, fieldR, hint, threshold = null) => {
                    const rawDiff = calculateDiff(somaData[fieldL], somaData[fieldR]);
                    const isSignificant = threshold && rawDiff !== null && Math.abs(rawDiff) >= threshold;
                    
                    let diffText = '';
                    let diffColorClass = 'bg-gray-100 text-gray-700';
                    
                    if (rawDiff !== null) {
                        if (rawDiff > 0) {
                            diffText = `+${rawDiff.toFixed(1)} см (Отёк?)`;
                            diffColorClass = 'bg-amber-100 text-amber-800';
                        } else if (rawDiff < 0) {
                            diffText = `${rawDiff.toFixed(1)} см (Дефицит)`;
                            diffColorClass = isSignificant ? 'bg-red-100 text-red-800' : 'bg-orange-100 text-orange-800';
                        } else {
                            diffText = '0 см (Симметрия)';
                            diffColorClass = 'bg-green-100 text-green-700';
                        }
                    }

                    return (
                        <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100 mb-4 transition-all hover:shadow-md">
                            <div className="flex flex-col md:flex-row justify-between md:items-center mb-3 gap-2">
                                <h3 className="font-semibold text-gray-800 text-lg flex items-center gap-2">
                                    {label}
                                </h3>
                                {rawDiff !== null && (
                                    <span className={`text-sm font-medium px-3 py-1 rounded-full ${diffColorClass}`}>
                                        Травма vs Норма: {diffText}
                                    </span>
                                )}
                            </div>
                            
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">
                                <div className={`flex items-center gap-3 p-3 rounded-lg border-2 transition-all ${injuredSide === 'left' ? 'border-teal-200 bg-teal-50' : 'border-transparent bg-gray-50'}`}>
                                    <span className="font-medium text-gray-600 w-16">
                                        Левая: {injuredSide === 'left' && <span className="text-teal-600 text-xs block">(Травма)</span>}
                                    </span>
                                    <input 
                                        type="number" step="0.1" placeholder="0.0"
                                        className="w-full bg-white border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
                                        value={somaData[fieldL]} onChange={(e) => handleSomaChange(fieldL, e.target.value)}
                                    />
                                    <span className="text-gray-400">см</span>
                                </div>
                                <div className={`flex items-center gap-3 p-3 rounded-lg border-2 transition-all ${injuredSide === 'right' ? 'border-teal-200 bg-teal-50' : 'border-transparent bg-gray-50'}`}>
                                    <span className="font-medium text-gray-600 w-16">
                                        Правая: {injuredSide === 'right' && <span className="text-teal-600 text-xs block">(Травма)</span>}
                                    </span>
                                    <input 
                                        type="number" step="0.1" placeholder="0.0"
                                        className="w-full bg-white border border-gray-300 rounded-md px-3 py-2 focus:outline-none focus:ring-2 focus:ring-teal-500"
                                        value={somaData[fieldR]} onChange={(e) => handleSomaChange(fieldR, e.target.value)}
                                    />
                                    <span className="text-gray-400">см</span>
                                </div>
                            </div>

                            <div className="bg-blue-50/50 p-3 rounded-lg flex items-start gap-2 text-sm text-blue-800">
                                <Icons.Info size={16} className="mt-0.5 flex-shrink-0" />
                                <p>{hint}</p>
                            </div>

                            {isSignificant && rawDiff < 0 && (
                                <div className="mt-3 bg-red-50 p-3 rounded-lg flex items-start gap-2 text-sm text-red-800">
                                    <Icons.AlertTriangle size={16} className="mt-0.5 flex-shrink-0" />
                                    <p>Внимание: Дефицит более {threshold} см. Разница в окружности бедра в 2.5 см коррелирует со снижением силы квадрицепса на ~33%.</p>
                                </div>
                            )}
                        </div>
                    );
                };

                return (
                    <div className="space-y-6 fade-in">
                        <SideSelector />
                        <div className="bg-gradient-to-r from-teal-500 to-emerald-600 p-6 rounded-2xl text-white shadow-lg">
                            <h2 className="text-2xl font-bold mb-2">Соматометрия</h2>
                            <p className="opacity-90">Измерение окружностей тела. Отрицательная разница указывает на гипотрофию (дефицит), положительная — на возможный отёк травмированной стороны.</p>
                        </div>

                        <div className="space-y-2">
                            <h3 className="text-xl font-bold text-gray-800 ml-2">Коленный сустав (Бедро)</h3>
                            {renderRow('Mid-line (центр надколенника)', 'kneeMidL', 'kneeMidR', 'Измеряется через центр коленной чашечки. Лента плотно прилегает, без сильного натяжения.', null)}
                            {renderRow('+5 см от верхнего края (VMO)', 'knee5L', 'knee5R', 'Отмерьте 5 см вверх от верхнего края надколенника. Замер проводится в состоянии максимального напряжения квадрицепса!', 2.5)}
                            {renderRow('+10 см от верхнего края (Квадрицепс)', 'knee10L', 'knee10R', 'Отмерьте 10 см вверх от верхнего края. Замер в состоянии максимального напряжения.', 2.5)}
                        </div>

                        <div className="space-y-2">
                            <h3 className="text-xl font-bold text-gray-800 ml-2 mt-8">Голень и Голеностоп</h3>
                            {renderRow('Икроножная мышца', 'calfL', 'calfR', 'Измеряется по самому широкому месту при максимальном напряжении (носок от себя).', null)}
                            {renderRow('Голеностоп (восьмеркой)', 'ankle8L', 'ankle8R', 'Для оценки отёка: середина между сухожилием передней большеберцовой и латеральной лодыжкой -> ладьевидная кость -> основание 5-й плюсневой -> медиальная лодыжка -> возврат.', null)}
                        </div>
                    </div>
                );
            };

            const renderGoniometryTab = () => {
                const renderJoint = (title, flexAromL, flexAromR, flexPromL, flexPromR, normNotes) => {
                    const reserveL = calculateReserve(gonioData[flexAromL], gonioData[flexPromL]);
                    const reserveR = calculateReserve(gonioData[flexAromR], gonioData[flexPromR]);

                    let aromDeficit = null;
                    if (gonioData[flexAromL] && gonioData[flexAromR]) {
                        const valL = parseFloat(gonioData[flexAromL]);
                        const valR = parseFloat(gonioData[flexAromR]);
                        aromDeficit = injuredSide === 'left' ? valR - valL : valL - valR;
                    }

                    return (
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 mb-6 transition-all hover:shadow-md">
                            <div className="flex flex-col md:flex-row justify-between md:items-start mb-4 border-b pb-2 gap-2">
                                <h3 className="font-semibold text-gray-800 text-xl">{title}</h3>
                                {aromDeficit !== null && (
                                    <div className={`px-3 py-1 rounded-md text-sm font-medium ${aromDeficit > 5 ? 'bg-orange-100 text-orange-800' : 'bg-green-100 text-green-700'}`}>
                                        Дефицит активного объёма: {aromDeficit > 0 ? `${aromDeficit}°` : 'Нет (Норма)'}
                                    </div>
                                )}
                            </div>
                            
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                {/* Левая сторона */}
                                <div className={`space-y-4 p-4 rounded-xl border-2 transition-all ${injuredSide === 'left' ? 'border-indigo-200 bg-indigo-50/30' : 'border-transparent'}`}>
                                    <h4 className="font-medium flex items-center gap-2 text-indigo-800">
                                        <Icons.ChevronRight size={16}/> 
                                        Левая конечность 
                                        {injuredSide === 'left' && <span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full">Травмированная</span>}
                                    </h4>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-white shadow-sm p-3 rounded-lg border border-gray-100">
                                            <label className="block text-xs text-gray-500 uppercase tracking-wider mb-1">Активный (AROM)</label>
                                            <div className="flex items-center gap-2">
                                                <input type="number" placeholder="0" className="w-full bg-gray-50 border border-gray-200 rounded px-2 py-1" value={gonioData[flexAromL]} onChange={e => handleGonioChange(flexAromL, e.target.value)} />
                                                <span className="text-gray-400">°</span>
                                            </div>
                                        </div>
                                        <div className="bg-white shadow-sm p-3 rounded-lg border border-gray-100">
                                            <label className="block text-xs text-gray-500 uppercase tracking-wider mb-1">Пассивный (PROM)</label>
                                            <div className="flex items-center gap-2">
                                                <input type="number" placeholder="0" className="w-full bg-gray-50 border border-gray-200 rounded px-2 py-1" value={gonioData[flexPromL]} onChange={e => handleGonioChange(flexPromL, e.target.value)} />
                                                <span className="text-gray-400">°</span>
                                            </div>
                                        </div>
                                    </div>
                                    {reserveL !== null && (
                                        <div className="text-sm font-medium text-indigo-700 bg-indigo-100 p-2 rounded">
                                            Резерв движения: {reserveL}°
                                        </div>
                                    )}
                                </div>

                                {/* Правая сторона */}
                                <div className={`space-y-4 p-4 rounded-xl border-2 transition-all ${injuredSide === 'right' ? 'border-indigo-200 bg-indigo-50/30' : 'border-transparent'}`}>
                                    <h4 className="font-medium flex items-center gap-2 text-indigo-800">
                                        <Icons.ChevronRight size={16}/> 
                                        Правая конечность
                                        {injuredSide === 'right' && <span className="text-xs bg-indigo-100 text-indigo-700 px-2 py-0.5 rounded-full">Травмированная</span>}
                                    </h4>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="bg-white shadow-sm p-3 rounded-lg border border-gray-100">
                                            <label className="block text-xs text-gray-500 uppercase tracking-wider mb-1">Активный (AROM)</label>
                                            <div className="flex items-center gap-2">
                                                <input type="number" placeholder="0" className="w-full bg-gray-50 border border-gray-200 rounded px-2 py-1" value={gonioData[flexAromR]} onChange={e => handleGonioChange(flexAromR, e.target.value)} />
                                                <span className="text-gray-400">°</span>
                                            </div>
                                        </div>
                                        <div className="bg-white shadow-sm p-3 rounded-lg border border-gray-100">
                                            <label className="block text-xs text-gray-500 uppercase tracking-wider mb-1">Пассивный (PROM)</label>
                                            <div className="flex items-center gap-2">
                                                <input type="number" placeholder="0" className="w-full bg-gray-50 border border-gray-200 rounded px-2 py-1" value={gonioData[flexPromR]} onChange={e => handleGonioChange(flexPromR, e.target.value)} />
                                                <span className="text-gray-400">°</span>
                                            </div>
                                        </div>
                                    </div>
                                    {reserveR !== null && (
                                        <div className="text-sm font-medium text-indigo-700 bg-indigo-100 p-2 rounded">
                                            Резерв движения: {reserveR}°
                                        </div>
                                    )}
                                </div>
                            </div>

                            <div className="mt-5 bg-blue-50/50 p-4 rounded-lg text-sm text-blue-800 grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <h5 className="font-semibold mb-1 flex items-center gap-1"><Icons.Info size={16}/> Функциональные нормы:</h5>
                                    <ul className="list-disc pl-5 space-y-1">
                                        {normNotes.map((note, idx) => <li key={idx}>{note}</li>)}
                                    </ul>
                                </div>
                                <div>
                                    <h5 className="font-semibold mb-1 flex items-center gap-1"><Icons.AlertTriangle size={16}/> Важно:</h5>
                                    <p>Сравнивайте активный объём (AROM) травмированной стороны со здоровой. Разница между AROM и PROM — это «Резерв движения».</p>
                                </div>
                            </div>
                        </div>
                    );
                };

                return (
                    <div className="space-y-6 fade-in">
                        <SideSelector />
                        <div className="bg-gradient-to-r from-indigo-500 to-purple-600 p-6 rounded-2xl text-white shadow-lg">
                            <h2 className="text-2xl font-bold mb-2">Гониометрия</h2>
                            <p className="opacity-90">Измерение углов в суставах. 0° — анатомическое положение. Оценивайте активный (AROM) и пассивный (PROM) объем. Расчет дефицита идет относительно здоровой стороны.</p>
                        </div>

                        {renderJoint(
                            'Сгибание коленного сустава', 
                            'kneeAromFlexL', 'kneeAromFlexR', 'kneePromFlexL', 'kneePromFlexR',
                            [
                                '~65° сгибания нужно для обычной походки',
                                '~90° – чтобы спускаться по лестнице',
                                '~105° – чтобы встать со стула',
                                'Полный объем: до ~135°'
                            ]
                        )}

                        {renderJoint(
                            'Отведение плечевого сустава', 
                            'shoulderAromAbdL', 'shoulderAromAbdR', 'shoulderPromAbdL', 'shoulderPromAbdR',
                            [
                                '0° – рука опущена вдоль тела',
                                'Полное отведение до 180° (зависит от строения)'
                            ]
                        )}
                    </div>
                );
            };

            const renderReportTab = () => {
                const formatDiffReport = (fieldL, fieldR) => {
                    const rawDiff = calculateDiff(somaData[fieldL], somaData[fieldR]);
                    if (rawDiff === null) return '-';
                    if (rawDiff > 0) return <span className="text-amber-600 font-medium">+{rawDiff.toFixed(1)} (Отёк)</span>;
                    if (rawDiff < 0) return <span className="text-red-600 font-medium">{rawDiff.toFixed(1)} (Дефицит)</span>;
                    return <span className="text-green-600 font-medium">0 (Норма)</span>;
                };

                const formatAromDeficit = (aromL, aromR) => {
                    if (!gonioData[aromL] || !gonioData[aromR]) return '-';
                    const valL = parseFloat(gonioData[aromL]);
                    const valR = parseFloat(gonioData[aromR]);
                    const deficit = injuredSide === 'left' ? valR - valL : valL - valR;
                    
                    if (deficit > 0) return <span className="text-orange-600 font-medium">-{deficit}°</span>;
                    return <span className="text-green-600 font-medium">Нет</span>;
                };

                return (
                    <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 fade-in">
                        <div className="flex justify-between items-center mb-6 border-b pb-4">
                            <div>
                                <h2 className="text-2xl font-bold text-gray-800 flex items-center gap-2">
                                    <Icons.FileText className="text-teal-600" />
                                    Отчет о замерах
                                </h2>
                                <p className="text-gray-500 mt-1 flex items-center gap-1">
                                    Травмированная сторона: <strong className="text-gray-800 uppercase">{injuredSide === 'left' ? 'Левая' : 'Правая'}</strong>
                                </p>
                            </div>
                            <button 
                                onClick={() => window.print()}
                                className="px-4 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 rounded-lg font-medium transition-colors print-hidden"
                            >
                                Печать
                            </button>
                        </div>

                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                            <div>
                                <h3 className="text-lg font-bold text-teal-700 mb-4 flex items-center gap-2">
                                    <Icons.CheckCircle2 size={18} /> Соматометрия
                                </h3>
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-gray-50 text-gray-600">
                                        <tr>
                                            <th className="py-2 px-3 rounded-tl-lg">Зона</th>
                                            <th className="py-2 px-3">Травма (см)</th>
                                            <th className="py-2 px-3">Здоровая (см)</th>
                                            <th className="py-2 px-3 rounded-tr-lg">Разница</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        {[
                                            { label: 'Mid-line', l: 'kneeMidL', r: 'kneeMidR' },
                                            { label: '+5 см (VMO)', l: 'knee5L', r: 'knee5R' },
                                            { label: '+10 см (Квадрицепс)', l: 'knee10L', r: 'knee10R' },
                                            { label: 'Икроножная мышца', l: 'calfL', r: 'calfR' },
                                            { label: 'Голеностоп (8-ка)', l: 'ankle8L', r: 'ankle8R' }
                                        ].map((row, idx) => (
                                            <tr key={idx}>
                                                <td className="py-2 px-3 text-gray-700">{row.label}</td>
                                                <td className="py-2 px-3 font-medium">{injuredSide === 'left' ? somaData[row.l] : somaData[row.r] || '-'}</td>
                                                <td className="py-2 px-3">{injuredSide === 'left' ? somaData[row.r] : somaData[row.l] || '-'}</td>
                                                <td className="py-2 px-3">{formatDiffReport(row.l, row.r)}</td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>

                            <div>
                                <h3 className="text-lg font-bold text-indigo-700 mb-4 flex items-center gap-2">
                                    <Icons.CheckCircle2 size={18} /> Гониометрия (Сгибание колена)
                                </h3>
                                <table className="w-full text-sm text-left">
                                    <thead className="bg-gray-50 text-gray-600">
                                        <tr>
                                            <th className="py-2 px-3 rounded-tl-lg">Сторона</th>
                                            <th className="py-2 px-3">AROM (°)</th>
                                            <th className="py-2 px-3">PROM (°)</th>
                                            <th className="py-2 px-3 rounded-tr-lg">Резерв</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-100">
                                        <tr className={injuredSide === 'left' ? 'bg-indigo-50/50' : ''}>
                                            <td className="py-2 px-3 font-medium text-gray-700 flex items-center gap-1">
                                                Левая (L) {injuredSide === 'left' && <Icons.AlertTriangle size={12} className="text-amber-500"/>}
                                            </td>
                                            <td className="py-2 px-3">{gonioData.kneeAromFlexL || '-'}</td>
                                            <td className="py-2 px-3">{gonioData.kneePromFlexL || '-'}</td>
                                            <td className="py-2 px-3 font-medium text-indigo-600">{calculateReserve(gonioData.kneeAromFlexL, gonioData.kneePromFlexL) || '-'}</td>
                                        </tr>
                                        <tr className={injuredSide === 'right' ? 'bg-indigo-50/50' : ''}>
                                            <td className="py-2 px-3 font-medium text-gray-700 flex items-center gap-1">
                                                Правая (R) {injuredSide === 'right' && <Icons.AlertTriangle size={12} className="text-amber-500"/>}
                                            </td>
                                            <td className="py-2 px-3">{gonioData.kneeAromFlexR || '-'}</td>
                                            <td className="py-2 px-3">{gonioData.kneePromFlexR || '-'}</td>
                                            <td className="py-2 px-3 font-medium text-indigo-600">{calculateReserve(gonioData.kneeAromFlexR, gonioData.kneePromFlexR) || '-'}</td>
                                        </tr>
                                        <tr>
                                            <td colSpan="4" className="py-3 px-3 bg-gray-50">
                                                <span className="text-gray-600">Дефицит активного сгибания (AROM): </span>
                                                {formatAromDeficit('kneeAromFlexL', 'kneeAromFlexR')}
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-5xl mx-auto">
                        <header className="mb-8 print-hidden">
                            <h1 className="text-3xl font-extrabold text-gray-900 tracking-tight">Клинические замеры</h1>
                            <p className="text-gray-500 mt-1">Оценка исходного состояния, мониторинг прогресса</p>
                        </header>

                        <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden mb-6 print-hidden">
                            <div className="flex overflow-x-auto border-b border-gray-100">
                                {renderTabButton('somatometry', Icons.Ruler, 'Соматометрия')}
                                {renderTabButton('gonio', Icons.Activity, 'Гониометрия')}
                                {renderTabButton('report', Icons.FileText, 'Сводный Отчет')}
                            </div>
                        </div>

                        <main>
                            {activeTab === 'somatometry' && renderSomatometryTab()}
                            {activeTab === 'gonio' && renderGoniometryTab()}
                            {activeTab === 'report' && renderReportTab()}
                        </main>
                    </div>
                </div>
            );
        };

        // Инициализация React 18
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
